<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps & Cloud MCQ Practice</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --surface2: #0f3460;
            --text: #e0e0e0;
            --text-secondary: #b0b0b0;
            --accent: #e94560;
            --accent-hover: #ff6b81;
            --correct: #2ecc71;
            --correct-bg: rgba(46, 204, 113, 0.15);
            --wrong: #e74c3c;
            --wrong-bg: rgba(231, 76, 60, 0.15);
            --border: #2a2a4a;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --progress-bg: #2a2a4a;
            --option-hover: #1a3a5c;
            --badge-bg: #0f3460;
            --divider: #2a2a4a;
            --toggle-bg: #2a2a4a;
            --font: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface2: #e8e8ed;
            --text: #1a1a2e;
            --text-secondary: #555;
            --accent: #c0392b;
            --accent-hover: #e74c3c;
            --correct: #27ae60;
            --correct-bg: rgba(39, 174, 96, 0.1);
            --wrong: #c0392b;
            --wrong-bg: rgba(192, 57, 43, 0.1);
            --border: #ddd;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
            --progress-bg: #e0e0e0;
            --option-hover: #e8e8f0;
            --badge-bg: #e0e0e8;
            --divider: #e0e0e0;
            --toggle-bg: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background var(--transition), color var(--transition);
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 32px 28px 28px;
            transition: background var(--transition), box-shadow var(--transition);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--accent), #ff6b81, #e94560, #c0392b);
            border-radius: 20px 20px 0 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .title-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            font-size: 28px;
        }
        .title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toggle-btn {
            background: var(--toggle-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .toggle-btn:hover {
            background: var(--surface2);
            border-color: var(--accent);
        }
        .toggle-btn .icon {
            font-size: 1.1rem;
        }

        .restart-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .restart-btn:hover {
            background: var(--surface2);
            border-color: var(--accent);
        }

        .stats-bar {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 18px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            align-items: center;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--badge-bg);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
            transition: background var(--transition);
        }
        .stat-value {
            color: var(--accent);
            font-weight: 700;
        }
        .stat-value.correct-count {
            color: var(--correct);
        }
        .stat-value.wrong-count {
            color: var(--wrong);
        }

        .progress-container {
            margin-bottom: 20px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--progress-bg);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .question-card {
            background: var(--surface2);
            border-radius: 14px;
            padding: 22px 20px;
            margin-bottom: 18px;
            border: 1px solid var(--border);
            transition: all var(--transition);
            position: relative;
        }
        .question-number {
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .question-text {
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.5;
            letter-spacing: -0.1px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 18px;
        }
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 14px 18px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--text);
            font-family: var(--font);
            transition: all var(--transition);
            position: relative;
            line-height: 1.4;
            letter-spacing: -0.1px;
        }
        .option-btn:hover:not(.disabled) {
            background: var(--option-hover);
            border-color: var(--accent);
            transform: translateX(3px);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }
        .option-btn:active:not(.disabled) {
            transform: scale(0.985);
        }
        .option-btn.disabled {
            cursor: not-allowed;
            opacity: 0.75;
        }
        .option-btn.selected-correct {
            border-color: var(--correct) !important;
            background: var(--correct-bg) !important;
            animation: pulse-green 0.5s ease;
        }
        .option-btn.selected-wrong {
            border-color: var(--wrong) !important;
            background: var(--wrong-bg) !important;
            animation: shake 0.5s ease;
        }
        .option-btn.show-correct {
            border-color: var(--correct) !important;
            background: var(--correct-bg) !important;
        }
        .option-btn .indicator {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            font-weight: 700;
        }
        .indicator.correct-icon {
            color: var(--correct);
        }
        .indicator.wrong-icon {
            color: var(--wrong);
        }

        @keyframes pulse-green {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.4);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(46, 204, 113, 0);
            }
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-8px);
            }
            40% {
                transform: translateX(8px);
            }
            60% {
                transform: translateX(-5px);
            }
            80% {
                transform: translateX(5px);
            }
        }

        .feedback-area {
            min-height: 48px;
            margin-bottom: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all var(--transition);
            opacity: 0;
            transform: translateY(-8px);
        }
        .feedback-area.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .feedback-area.feedback-correct {
            background: var(--correct-bg);
            color: var(--correct);
            border: 1px solid var(--correct);
        }
        .feedback-area.feedback-wrong {
            background: var(--wrong-bg);
            color: var(--wrong);
            border: 1px solid var(--wrong);
        }
        .feedback-icon {
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .next-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: var(--font);
            transition: all var(--transition);
            letter-spacing: -0.2px;
        }
        .next-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 68, 96, 0.35);
        }
        .next-btn:active {
            transform: scale(0.96);
        }
        .next-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .completion-screen {
            text-align: center;
            padding: 30px 10px;
        }
        .completion-emoji {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .completion-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .completion-stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .completion-stat {
            background: var(--surface2);
            padding: 16px 24px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border);
            min-width: 100px;
        }
        .completion-stat .big-num {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .completion-stat .big-num.green {
            color: var(--correct);
        }
        .completion-stat .big-num.red {
            color: var(--wrong);
        }
        .completion-stat .big-num.accent {
            color: var(--accent);
        }
        .completion-stat .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 14px 18px;
                border-radius: 16px;
            }
            .container::before {
                border-radius: 16px 16px 0 0;
                height: 4px;
            }
            .title {
                font-size: 1.1rem;
            }
            .question-text {
                font-size: 0.95rem;
            }
            .option-btn {
                font-size: 0.85rem;
                padding: 12px 14px;
            }
            .header {
                gap: 8px;
            }
            .toggle-btn,
            .restart-btn {
                font-size: 0.75rem;
                padding: 6px 10px;
            }
            .stats-bar {
                gap: 8px;
            }
            .stat-item {
                font-size: 0.7rem;
                padding: 5px 10px;
            }
            .completion-stat {
                padding: 12px 16px;
                min-width: 80px;
            }
            .completion-stat .big-num {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="appContainer">
        <!-- Header -->
        <div class="header">
            <div class="title-area">
                <span class="logo-icon">📚</span>
                <div>
                    <div class="title">DevOps & Cloud MCQ</div>
                    <div class="subtitle">Practice • Review • Master</div>
                </div>
            </div>
            <div class="header-actions">
                <button class="toggle-btn" id="themeToggle" title="Toggle light/dark mode">
                    <span class="icon">🌙</span> <span id="themeLabel">Dark</span>
                </button>
                <button class="restart-btn" id="restartBtn" title="Restart all questions">
                    <span>🔄</span> Restart
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-item">✅ Correct: <span class="stat-value correct-count" id="correctCount">0</span></div>
            <div class="stat-item">❌ Wrong: <span class="stat-value wrong-count" id="wrongCount">0</span></div>
            <div class="stat-item">📝 Remaining: <span class="stat-value" id="remainingCount">0</span></div>
            <div class="stat-item">📋 Total: <span class="stat-value" id="totalCount">0</span></div>
        </div>

        <!-- Progress -->
        <div class="progress-container">
            <div class="progress-label">
                <span>Progress</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
        </div>

        <!-- Quiz Area -->
        <div id="quizArea">
            <div class="question-card">
                <div class="question-number" id="questionNumber">QUESTION 1</div>
                <div class="question-text" id="questionText">Loading...</div>
            </div>
            <div class="options-list" id="optionsList"></div>
            <div class="feedback-area" id="feedbackArea"></div>
            <div class="btn-row">
                <button class="next-btn" id="nextBtn" disabled>Next Question →</button>
            </div>
        </div>

        <!-- Completion Screen -->
        <div id="completionScreen" class="completion-screen hidden">
            <div class="completion-emoji" id="completionEmoji">🎉</div>
            <div class="completion-title" id="completionTitle">Great job!</div>
            <p style="color:var(--text-secondary);margin-bottom:8px;">You've completed all questions.</p>
            <div class="completion-stats">
                <div class="completion-stat">
                    <div class="big-num green" id="finalCorrect">0</div>
                    <div class="label">Correct</div>
                </div>
                <div class="completion-stat">
                    <div class="big-num red" id="finalWrong">0</div>
                    <div class="label">Wrong</div>
                </div>
                <div class="completion-stat">
                    <div class="big-num accent" id="finalPercent">0%</div>
                    <div class="label">Score</div>
                </div>
            </div>
            <button class="next-btn" id="restartBtn2" style="margin-top:12px;">🔄 Restart Practice</button>
        </div>
    </div>

    <script>
        (function() {
            // ─────────────────────────────────────────────────────────────
            // COMPLETE QUESTION BANK — all 70+ MCQs merged from 3 sources
            // ─────────────────────────────────────────────────────────────
            const allQuestions = [
                // === FIRST JSON ARRAY (24 questions) ===
                {
                    question: "Two developers try to merge a hotfix branch into a release branch. Git reports conflicts and the team decides to abandon the merge attempt completely and return to the previous state.",
                    options: [
                        "Use git rebase --continue",
                        "Use git merge --abort to stop the merge and return to the pre-merge state",
                        "Use git revert on the conflicted files",
                        "Use git restore --staged on the whole repository"
                    ],
                    answer: "Use git merge --abort to stop the merge and return to the pre-merge state"
                }, {
                    question: "Which GitHub Actions statements are correct?",
                    options: [
                        "Statements 1 and 4 are correct; Statements 2 and 3 are incorrect",
                        "Statements 1, 2, 3, and 4 are all correct",
                        "Statements 2 and 4 are correct; Statements 1 and 3 are incorrect",
                        "Statements 1, 2, and 3 are correct; Statement 4 is incorrect"
                    ],
                    answer: "Statements 1, 2, and 3 are correct; Statement 4 is incorrect"
                }, {
                    question: "Which JSON and YAML statements are correct?",
                    options: [
                        "Statements 1 and 3 are correct; Statements 2 and 4 are incorrect",
                        "Statements 1, 2, 3, and 4 are all correct",
                        "Statements 1 and 2 are correct; Statements 3 and 4 are incorrect",
                        "Statements 2 and 4 are correct; Statements 1 and 3 are incorrect"
                    ],
                    answer: "Statements 1 and 2 are correct; Statements 3 and 4 are incorrect"
                }, {
                    question: "A team launches EC2 instances that must call AWS APIs securely.",
                    options: [
                        "Create one shared plaintext key for all servers",
                        "Use the root user's access keys",
                        "Keep static keys in the application package",
                        "Use an IAM role delivered through an instance profile instead of hard-coding credentials"
                    ],
                    answer: "Use an IAM role delivered through an instance profile instead of hard-coding credentials"
                }, {
                    question: "Which AWS VPC security statements are correct?",
                    options: [
                        "Statements 1, 2, and 3 are correct; Statement 4 is incorrect",
                        "Statements 2 and 4 are correct; Statements 1 and 3 are incorrect",
                        "Statements 1, 2, 3, and 4 are all correct",
                        "Statements 1 and 4 are correct; Statements 2 and 3 are incorrect"
                    ],
                    answer: "Statements 1, 2, and 3 are correct; Statement 4 is incorrect"
                }, {
                    question: "A developer wants live source-code syncing between host and container during development.",
                    options: [
                        "Use a second ENTRYPOINT",
                        "Use COPY in the Dockerfile",
                        "Use a named volume",
                        "Use a bind mount"
                    ],
                    answer: "Use a bind mount"
                }, {
                    question: "Which Jenkins stash and artifact statements are correct?",
                    options: [
                        "Statements 2 and 4 are correct; Statements 1 and 3 are incorrect",
                        "Statements 1, 2, 3, and 4 are all correct",
                        "Statements 1 and 4 are correct; Statements 2 and 3 are incorrect",
                        "Statements 1, 2, and 3 are correct; Statement 4 is incorrect"
                    ],
                    answer: "Statements 1, 2, and 3 are correct; Statement 4 is incorrect"
                }, {
                    question: "A deploy job in GitHub Actions must wait for build and test jobs.",
                    options: [
                        "Store deployment script in YAML comments",
                        "Declare job dependencies with needs",
                        "Put jobs in alphabetical order",
                        "Use a matrix strategy"
                    ],
                    answer: "Declare job dependencies with needs"
                }, {
                    question: "An application only needs read access to one S3 bucket prefix.",
                    options: [
                        "Create a role or policy allowing only the required read actions on the required S3 resources",
                        "Attach every S3 permission to the instance",
                        "Grant broad wildcard permissions first",
                        "Store a long-lived root access key on the instance"
                    ],
                    answer: "Create a role or policy allowing only the required read actions on the required S3 resources"
                }, {
                    question: "A backend team wants smaller Docker runtime images without build tools.",
                    options: [
                        "Add multiple CMD instructions",
                        "Use a multi-stage build with multiple FROM lines",
                        "Use a bind mount at runtime",
                        "Set WORKDIR twice"
                    ],
                    answer: "Use a multi-stage build with multiple FROM lines"
                }, {
                    question: "A compliance team needs WORM-style protection for S3 audit logs.",
                    options: [
                        "Use a larger EC2 instance",
                        "Use S3 Object Lock",
                        "Use a security group on the log-processing server",
                        "Use Docker multi-stage build"
                    ],
                    answer: "Use S3 Object Lock"
                }, {
                    question: "A YAML manifest breaks because indentation changed.",
                    options: [
                        "YAML requires every mapping key to start at column one",
                        "YAML block structure depends on indentation",
                        "YAML ignores indentation for structure",
                        "YAML uses only alphabetical key ordering"
                    ],
                    answer: "YAML block structure depends on indentation"
                }, {
                    question: "An engineer must safely undo a bad commit already pushed to a shared branch.",
                    options: [
                        "Use git reset --hard and force-push",
                        "Use git revert",
                        "Delete and recreate the branch",
                        "Use git rebase on the branch"
                    ],
                    answer: "Use git revert"
                }, {
                    question: "A strict JSON parser fails after comments and trailing commas were added.",
                    options: [
                        "Remove comments and trailing commas",
                        "Replace trailing commas with semicolons",
                        "Switch the parser to infer indentation",
                        "Rename the file with a YAML extension"
                    ],
                    answer: "Remove comments and trailing commas"
                }, {
                    question: "GitHub Actions runs overlap on the same branch and should cancel older runs.",
                    options: [
                        "Use concurrency with cancel-in-progress",
                        "Use only workflow_dispatch",
                        "Use matrix.exclude",
                        "Use environment variables in alphabetical order"
                    ],
                    answer: "Use concurrency with cancel-in-progress"
                }, {
                    question: "A Docker image should always launch the same executable but allow overrideable default arguments.",
                    options: [
                        "Use exec-form ENTRYPOINT and CMD for default arguments",
                        "Use WORKDIR as the executable",
                        "Use only shell-form CMD",
                        "Use two ENTRYPOINT instructions"
                    ],
                    answer: "Use exec-form ENTRYPOINT and CMD for default arguments"
                }, {
                    question: "A Dockerfile contains two CMD instructions in the same stage.",
                    options: [
                        "CMD lines execute alphabetically",
                        "The first CMD is for build time and the second for runtime",
                        "Only the last CMD instruction takes effect",
                        "Every CMD creates a startup queue"
                    ],
                    answer: "Only the last CMD instruction takes effect"
                }, {
                    question: "A developer staged a secrets file by mistake but wants to keep local edits.",
                    options: [
                        "Run git revert on the file",
                        "Run git merge --abort",
                        "Run git restore --staged on the file",
                        "Run git reset --hard"
                    ],
                    answer: "Run git restore --staged on the file"
                }, {
                    question: "A developer wants to clean up local commits before opening a PR.",
                    options: [
                        "Use git clone again and copy files manually",
                        "Run git revert on unnecessary commits",
                        "Use interactive rebase",
                        "Delete the branch and recreate it"
                    ],
                    answer: "Use interactive rebase"
                }, {
                    question: "How are JSON and YAML 1.2 related?",
                    options: [
                        "A valid JSON document can also be parsed as YAML 1.2",
                        "JSON and YAML 1.2 are incompatible",
                        "YAML parsers require anchors before JSON works",
                        "Any YAML document is automatically valid JSON"
                    ],
                    answer: "A valid JSON document can also be parsed as YAML 1.2"
                }, {
                    question: "A YAML deployment file repeats the same configuration block many times.",
                    options: [
                        "Use tab-based indentation",
                        "Convert the entire file to JSON arrays",
                        "Replace repeated mappings with comments",
                        "Define the first block with an anchor and reuse it later with aliases"
                    ],
                    answer: "Define the first block with an anchor and reuse it later with aliases"
                }, {
                    question: "A reverted merge is merged again later and old changes do not fully reappear.",
                    options: [
                        "A reverted merge becomes a hidden stash entry",
                        "Reverting a merge signals those tree changes are unwanted",
                        "Git permanently blocks every future merge from that branch",
                        "Git converts the old merge into a rebase"
                    ],
                    answer: "Reverting a merge signals those tree changes are unwanted"
                }, {
                    question: "A production deployment in GitHub Actions should require approval before secrets are exposed.",
                    options: [
                        "Use concurrency with cancel-in-progress",
                        "Use an environment with deployment protection rules",
                        "Use upload-artifact and download-artifact",
                        "Use workflow_dispatch only"
                    ],

            // ─────────────────────────────────────
            // UTILITY: SHUFFLE (Fisher-Yates)
            // ─────────────────────────────────────
            function shuffle(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            // ─────────────────────────────────────
            // INIT / RESTART
            // ─────────────────────────────────────
            function initQuiz() {
                questions = shuffle(allQuestions);
                totalQuestions = questions.length;
                currentIndex = 0;
                correctCount = 0;
                wrongCount = 0;
                answered = false;
                totalCountEl.textContent = totalQuestions;
                updateStats();
                updateProgress();
                quizArea.classList.remove('hidden');
                completionScreen.classList.add('hidden');
                feedbackArea.classList.remove('visible', 'feedback-correct', 'feedback-wrong');
                feedbackArea.innerHTML = '';
                nextBtn.disabled = true;
                renderQuestion();
            }

            // ─────────────────────────────────────
            // RENDER CURRENT QUESTION
            // ─────────────────────────────────────
            function renderQuestion() {
                if (currentIndex >= totalQuestions) {
                    showCompletion();
                    return;
                }
                const q = questions[currentIndex];
                questionNumber.textContent = `QUESTION ${currentIndex + 1} OF ${totalQuestions}`;
                questionText.textContent = q.question;
                optionsList.innerHTML = '';
                feedbackArea.classList.remove('visible', 'feedback-correct', 'feedback-wrong');
                feedbackArea.innerHTML = '';
                nextBtn.disabled = true;
                answered = false;

                // Shuffle option order for each render
                const optionIndices = shuffle([...Array(q.options.length).keys()]);
                const shuffledOptions = optionIndices.map(i => q.options[i]);

                shuffledOptions.forEach((optText) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = optText;
                    btn.addEventListener('click', () => handleOptionClick(btn, optText, q));
                    optionsList.appendChild(btn);
                });

                updateProgress();
                updateStats();

                    const indicator = document.createElement('span');
                    indicator.className = 'indicator correct-icon';
                    indicator.textContent = '✓';
                    btn.appendChild(indicator);
                    feedbackArea.classList.add('visible', 'feedback-correct');
                    feedbackArea.innerHTML =
                        '<span class="feedback-icon">✅</span> Correct! Well done.';
                } else {
                    wrongCount++;
                    btn.classList.add('selected-wrong');
                    const indicator = document.createElement('span');
                    indicator.className = 'indicator wrong-icon';
                    indicator.textContent = '✗';
                    btn.appendChild(indicator);

                    // Highlight the correct answer
                    allBtns.forEach(b => {
                        const btnText = b.textContent.replace(/[✓✗]/g, '').trim();
                        if (btnText === questionObj.answer.trim()) {
                            b.classList.add('show-correct');
                            const corrInd = document.createElement('span');
                            corrInd.className = 'indicator correct-icon';
                            corrInd.textContent = '✓';
                            b.appendChild(corrInd);
                        }
                    });

                    feedbackArea.classList.add('visible', 'feedback-wrong');
                    feedbackArea.innerHTML =
                        '<span class="feedback-icon">❌</span> Incorrect. The correct answer is: <strong>' +
                        escapeHTML(questionObj.answer) + '</strong>';
                }

                updateStats();
                nextBtn.disabled = false;
                nextBtn.focus();
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ─────────────────────────────────────
            // NEXT QUESTION
            // ─────────────────────────────────────
            function nextQuestion() {
                currentIndex++;
                if (currentIndex >= totalQuestions) {
                    showCompletion();
                } else {
                    answered = false;
                    feedbackArea.classList.remove('visible', 'feedback-correct', 'feedback-wrong');
                    feedbackArea.innerHTML = '';
                    nextBtn.disabled = true;
                    renderQuestion();
                    document.getElementById('questionNumber').scrollIntoView({ behavior: 'smooth',
                        block: 'start' });
                }
            }

            // ─────────────────────────────────────
            // SHOW COMPLETION SCREEN
            // ─────────────────────────────────────
            function showCompletion() {
                quizArea.classList.add('hidden');
                completionScreen.classList.remove('hidden');
                finalCorrect.textContent = correctCount;
                finalWrong.textContent = wrongCount;
                const pct = totalQuestions > 0 ? Math.round((correctCount / totalQuestions) * 100) : 0;
                finalPercent.textContent = pct + '%';

                if (pct >= 90) {
                    completionEmoji.textContent = '🏆';
                    completionTitle.textContent = 'Outstanding!';
                } else if (pct >= 75) {
                    completionEmoji.textContent = '🎉';
                    completionTitle.textContent = 'Great job!';
                } else if (pct >= 50) {
                    completionEmoji.textContent = '👍';
                    completionTitle.textContent = 'Good effort!';
                } else {
                    completionEmoji.textContent = '📚';
                    completionTitle.textContent = 'Keep practicing!';
                }
                updateProgress();
                updateStats();
                completionScreen.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            // ─────────────────────────────────────
            // UPDATE STATS & PROGRESS
            // ─────────────────────────────────────
            function updateStats() {
                correctCountEl.textContent = correctCount;
                wrongCountEl.textContent = wrongCount;
                const remaining = totalQuestions - currentIndex - (answered ? 1 : 0);
                remainingCountEl.textContent = Math.max(0, remaining);
                totalCountEl.textContent = totalQuestions;
            }

            function updateProgress() {
                const done = correctCount + wrongCount;
                const pct = totalQuestions > 0 ? Math.round((done / totalQuestions) * 100) : 0;
                progressFill.style.width = pct + '%';
                progressPercent.textContent = pct + '%';
            }

            // ─────────────────────────────────────
            // THEME TOGGLE
            // ─────────────────────────────────────
            function applyTheme(isDark) {
                if (isDark) {
                    document.body.classList.remove('light-mode');
                    themeLabel.textContent = 'Dark';
                    themeToggle.querySelector('.icon').textContent = '🌙';
                } else {
                    document.body.classList.add('light-mode');
                    themeLabel.textContent = 'Light';
                    themeToggle.querySelector('.icon').textContent = '☀️';
                }
                localStorage.setItem('mcq-dark-mode', isDark ? 'dark' : 'light');
            }

            function toggleTheme() {
                const isDark = !document.body.classList.contains('light-mode');
                applyTheme(!isDark);
            }

            // Load saved theme preference
            const savedTheme = localStorage.getItem('mcq-dark-mode');
            if (savedTheme === 'light') {
                applyTheme(false);
            } else {
                applyTheme(true); // default dark
            }

            // ─────────────────────────────────────
            // EVENT LISTENERS
            // ─────────────────────────────────────
            nextBtn.addEventListener('click', nextQuestion);
            themeToggle.addEventListener('click', toggleTheme);
            restartBtn.addEventListener('click', () => {
                initQuiz();
                document.getElementById('questionNumber').scrollIntoView({ behavior: 'smooth',
                    block: 'start' });
            });
            restartBtn2.addEventListener('click', () => {
                initQuiz();
                document.getElementById('questionNumber').scrollIntoView({ behavior: 'smooth',
                    block: 'start' });
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    if (!nextBtn.disabled && document.activeElement !== nextBtn) {
                        if (answered || document.activeElement === document.body || !document
                            .activeElement.classList.contains('option-btn')) {
                            e.preventDefault();
                            nextQuestion();
                        }
                    }
                }
                if (!answered && e.key >= '1' && e.key <= '4') {
                    const idx = parseInt(e.key) - 1;
                    const btns = optionsList.querySelectorAll('.option-btn');
                    if (btns[idx]) {
                        e.preventDefault();
                        btns[idx].click();
                    }
                }
            });

            // ─────────────────────────────────────
            // START THE QUIZ
            // ─────────────────────────────────────
            totalCountEl.textContent = allQuestions.length;
            initQuiz();
        })();
    </script>
</body>
</html>
